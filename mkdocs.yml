site_name: ai-crafted-portfolio
site_description: Claudeを活用して作る技術ポートフォリオ
site_url: https://ai-crafted-portfolio.github.io/
site_author: ai-crafted-portfolio

repo_name: ai-crafted-portfolio/ai-crafted-portfolio.github.io
repo_url: https://github.com/ai-crafted-portfolio/ai-crafted-portfolio.github.io

copyright: Copyright &copy; 2026 ai-crafted-portfolio

theme:
  name: material
  language: ja
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - toc.integrate
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: ダークモードに切替
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: ライトモードに切替
  font:
    text: Noto Sans JP
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - ホーム: index.md