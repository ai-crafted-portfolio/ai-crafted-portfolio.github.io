site_name: ai-crafted-portfolio
site_description: Claudeを活用して作る技術ポートフォリオ
site_url: https://ai-crafted-portfolio.github.io/
site_author: ai-crafted-portfolio

copyright: Copyright &copy; 2026 ai-crafted-portfolio

theme:
  name: material
  language: ja
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.indexes
    - toc.integrate
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: ダークモードに切替
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: ライトモードに切替
  font:
    text: Noto Sans JP
    code: JetBrains Mono

validation:
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: info

not_in_nav: |
  research/index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/view-toggle.js

